spring:
  datasource:
    url: jdbc:h2:mem:timchat-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: localhost
      port: 6379

  liquibase:
    enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/timchat

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

app:
  storage:
    endpoint: http://localhost:9999
    access-key: test
    secret-key: test
    bucket: test-bucket
    region: us-east-1
    upload-url-expiry-seconds: 600
    download-url-expiry-seconds: 3600
    max-file-size-bytes: 26214400
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
      - application/pdf
      - text/plain
      - application/zip
