server:
  port: 8080

spring:
  application:
    name: timchat

  datasource:
    url: jdbc:postgresql://localhost:5432/timchat
    username: timchat
    password: timchat
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: localhost
      port: 6379

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/timchat
          jwk-set-uri: http://localhost:8180/realms/timchat/protocol/openid-connect/certs

app:
  storage:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: timchat-attachments
    region: us-east-1
    upload-url-expiry-seconds: 600
    download-url-expiry-seconds: 3600
    max-file-size-bytes: 26214400
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
      - image/svg+xml
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.ms-powerpoint
      - application/vnd.openxmlformats-officedocument.presentationml.presentation
      - text/plain
      - text/csv
      - application/zip
      - application/x-rar-compressed
      - application/x-7z-compressed
      - application/gzip
      - video/mp4
      - audio/mpeg

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
