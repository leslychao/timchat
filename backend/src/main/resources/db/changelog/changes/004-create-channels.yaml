databaseChangeLog:
  - changeSet:
      id: 004-create-channels
      author: timchat
      changes:
        - createTable:
            tableName: channels
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workspace_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_channels_workspace
                    references: workspaces(id)
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: int
                  constraints:
                    nullable: false
                  defaultValueNumeric: 0
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - createIndex:
            tableName: channels
            indexName: idx_channels_workspace
            columns:
              - column:
                  name: workspace_id
        - createIndex:
            tableName: channels
            indexName: idx_channels_workspace_position
            columns:
              - column:
                  name: workspace_id
              - column:
                  name: position
